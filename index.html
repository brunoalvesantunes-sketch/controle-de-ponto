<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Controle de Ponto</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px;
      width: 480px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .logo { font-size: 48px; margin-bottom: 10px; }
    h1 {
      color: #fff;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }
    .relogio {
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      padding: 14px 24px;
      margin-bottom: 24px;
    }
    .hora {
      color: #00d4ff;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 4px;
    }
    .data {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      margin-top: 4px;
    }
    .camera-container {
      position: relative;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
      background: #000;
      aspect-ratio: 4/3;
    }
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
    }
    .camera-erro {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      padding: 16px;
      text-align: center;
    }
    canvas { display: none; }
    label {
      display: block;
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      margin-bottom: 10px;
      text-align: left;
    }
    input[type="text"] {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: #fff;
      font-size: 18px;
      letter-spacing: 3px;
      text-align: center;
      outline: none;
      transition: border-color 0.3s, background 0.3s;
      margin-bottom: 20px;
    }
    input[type="text"]::placeholder {
      color: rgba(255,255,255,0.3);
      font-size: 14px;
      letter-spacing: 1px;
    }
    input[type="text"]:focus {
      border-color: #00d4ff;
      background: rgba(0,212,255,0.05);
    }
    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,212,255,0.4); }
    button[disabled] { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
    .status {
      margin-top: 20px;
      padding: 14px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      display: none;
      text-align: center;
    }
    .status.sucesso {
      background: rgba(0,200,100,0.15);
      border: 1px solid rgba(0,200,100,0.5);
      color: #00e676;
      display: block;
    }
    .status.erro {
      background: rgba(255,60,60,0.15);
      border: 1px solid rgba(255,60,60,0.5);
      color: #ff5252;
      display: block;
    }
    .status.carregando {
      background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.3);
      color: #00d4ff;
      display: block;
    }
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(0,212,255,0.3);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">&#128336;</div>
  <h1>Controle de Ponto</h1>
  <div class="relogio">
    <div class="hora" id="hora">--:--:--</div>
    <div class="data" id="data">&nbsp;</div>
  </div>
  <div class="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <div class="camera-erro" id="camera-erro">
      Camera indisponivel. O ponto sera registrado sem foto.
    </div>
  </div>
  <canvas id="canvas"></canvas>
  <label for="cpf">Digite seu CPF (somente numeros)</label>
  <input type="text" id="cpf" placeholder="00000000000" maxlength="11" inputmode="numeric"/>
  <button id="btn">Bater Ponto</button>
  <div class="status" id="status"></div>
</div>

<script>
(function() {

  var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzc87sQcjAbDtkmTR-5n9QQFsEPxYDuX9E7fMrLXUN5GyZ9QpBojLTkDL_QL_MFYU5M/exec';
  var FOTO_URL        = 'https://script.google.com/macros/s/AKfycbxua6tzcQGp0FC2-oN9jybE1rJwDVZSNP4vY0jcfFXpNhQcW6eHAwHMXGuShmIfkZpm/exec';

  var DIAS    = ['Domingo','Segunda-feira','Terca-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sabado'];
  var MESES_L = ['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var cameraOk = false;

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function tick() {
    var d = new Date();
    document.getElementById('hora').textContent =
      pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    document.getElementById('data').textContent =
      DIAS[d.getDay()] + ', ' + pad(d.getDate()) + ' de ' +
      MESES_L[d.getMonth()] + ' de ' + d.getFullYear();
  }
  tick();
  setInterval(tick, 1000);

  var video = document.getElementById('video');

  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
      .then(function(stream) {
        video.srcObject = stream;
        cameraOk = true;
      })
      .catch(function(err) {
        console.log('Erro camera: ' + err.message);
        mostrarErroCamera();
      });
  } else {
    mostrarErroCamera();
  }

  function mostrarErroCamera() {
    video.style.display = 'none';
    document.getElementById('camera-erro').style.display = 'flex';
    cameraOk = false;
  }

  function capturarFoto() {
    if (!cameraOk) return '';
    var canvas = document.getElementById('canvas');
    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;
    var ctx = canvas.getContext('2d');
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    return canvas.toDataURL('image/jpeg', 0.8);
  }

  function apenasNums(s) {
    var r = '';
    for (var i = 0; i < s.length; i++) {
      var c = s.charCodeAt(i);
      if (c >= 48 && c <= 57) r += s[i];
    }
    return r;
  }

  function validarCPF(cpf) {
    cpf = apenasNums(cpf);
    if (cpf.length !== 11) return false;
    var igual = true;
    for (var i = 1; i < 11; i++) { if (cpf[i] !== cpf[0]) { igual = false; break; } }
    if (igual) return false;
    var soma = 0, resto;
    for (var i = 0; i < 9; i++) soma += parseInt(cpf[i]) * (10 - i);
    resto = (soma * 10) % 11;
    if (resto === 10 || resto === 11) resto = 0;
    if (resto !== parseInt(cpf[9])) return false;
    soma = 0;
    for (var i = 0; i < 10; i++) soma += parseInt(cpf[i]) * (11 - i);
    resto = (soma * 10) % 11;
    if (resto === 10 || resto === 11) resto = 0;
    if (resto !== parseInt(cpf[10])) return false;
    return true;
  }

  function mostrarStatus(msg, tipo) {
    var el = document.getElementById('status');
    el.className = 'status ' + tipo;
    el.innerHTML = tipo === 'carregando'
      ? '<span class="spinner"></span>' + msg
      : msg;
  }

  var campoCPF = document.getElementById('cpf');
  var btn      = document.getElementById('btn');

  campoCPF.addEventListener('input', function() {
    var v = apenasNums(this.value);
    this.value = v.length > 11 ? v.substring(0, 11) : v;
  });

  campoCPF.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') baterPonto();
  });

  btn.addEventListener('click', baterPonto);
  campoCPF.focus();

  function baterPonto() {
    var cpf = apenasNums(campoCPF.value);

    if (!validarCPF(cpf)) {
      mostrarStatus('CPF invalido. Verifique e tente novamente.', 'erro');
      campoCPF.focus();
      return;
    }

    var foto = capturarFoto();
    console.log('Foto capturada, tamanho: ' + foto.length + ' chars');

    var agora = new Date();
    var nomeArquivo = cpf + '_' +
      agora.getFullYear() +
      pad(agora.getMonth() + 1) +
      pad(agora.getDate()) +
      pad(agora.getHours()) +
      pad(agora.getMinutes()) +
      pad(agora.getSeconds()) + '.jpg';

    btn.setAttribute('disabled', 'disabled');
    mostrarStatus('Registrando ponto, aguarde...', 'carregando');

    // Chamada 1: registra o ponto na planilha
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ cpf: cpf })
    })
    .then(function() {
      // Chamada 2: envia a foto — também no-cors para evitar bloqueio CORS
      if (foto && foto.length > 100) {
        console.log('Enviando foto: ' + nomeArquivo);
        return fetch(FOTO_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ imagem: foto, nomeArquivo: nomeArquivo })
        });
      }
    })
    .then(function() {
      btn.removeAttribute('disabled');
      mostrarStatus('Ponto registrado com sucesso!', 'sucesso');
      campoCPF.value = '';
      campoCPF.focus();
    })
    .catch(function(err) {
      console.log('Erro: ' + err.message);
      btn.removeAttribute('disabled');
      mostrarStatus('Erro de conexao: ' + err.message, 'erro');
    });
  }

}());
</script>
</body>
</html>
